apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-python-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-python-app
  template:
    metadata:
      labels:
        app: my-python-app
    spec:
      containers:
      - name: my-python-app
        image: vakula2004/my-python-app:363
        ports:
        - containerPort: 5000
        # Пробы теперь на своем месте внутри контейнера
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        env:
        - name: REDIS_HOST
          value: "redis-service"
        - name: DB_HOST
          value: "postgres-service"
---
apiVersion: v1
kind: Service
metadata:
  name: crypto-monitor-service
  labels:
    app: crypto-monitor # Этот лейбл мы пропишем в ServiceMonitor
spec:
  ports:
  - name: http # Имя порта должно быть "http" или совпадать с тем, что в ServiceMonitor
    port: 80
    targetPort: 5000
  selector:
    app: crypto-monitor