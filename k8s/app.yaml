apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-python-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-python-app
  template:
    metadata:
      labels:
        app: my-python-app
    spec:
      containers:
      - name: my-python-app
        image: vakula2004/my-python-app:173
        env:
        - name: REDIS_HOST
          value: "redis-service" # Имя сервиса из файла выше
...
apiVersion: v1
kind: Service
metadata:
  name: my-python-app-service
  namespace: default
spec:
  selector:
    app: my-python-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: NodePort # Или NodePort, если ты в локальном кластере