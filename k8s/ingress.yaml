apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crypto-app-ingress
  namespace: default
  annotations:
    # Указываем, что этот ингресс обслуживается nginx-контроллером
    kubernetes.io/ingress.class: nginx
    # Опционально: если приложение делает редиректы
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-python-app-service
            port:
              number: 80