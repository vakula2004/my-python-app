<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Monitor - Dnipro Node</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .crypto-card { transition: transform 0.2s; }
        .crypto-card:hover { transform: scale(1.02); }
        .source-cache { color: #198754; font-weight: bold; }
        .source-api { color: #0d6efd; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">📈 Мониторинг Криптовалют</h1>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="table-responsive shadow-sm bg-white rounded">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Валюта</th>
                                <th>Цена (USDT)</th>
                                <th>Источник</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for symbol, info in data.items() %}
                            <tr>
                                <td><strong>{{ symbol }}</strong></td>
                                <td>${{ info.price }}</td>
                                <td>
                                    <span class="source-{{ info.source }}">
                                        {{ info.source | upper }}
                                    </span>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
                <p class="text-muted mt-3 text-center">
                    <small>Обновлено через: {{ host }} | Данные кэшируются в Redis на 60с</small>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
