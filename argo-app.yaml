apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-python-app
  namespace: argocd
spec:
  project: default
  source:
    # Твой репозиторий, где лежат манифесты
    repoURL: 'https://github.com/vakula2004/my-python-app.git'
    targetRevision: HEAD
    path: k8s  # Папка с файлом app.yaml, который мы обсуждали
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true     # Удалять ресурсы в K8s, если их удалили в Git
      selfHeal: true  # Если кто-то изменит K8s вручную, ArgoCD вернет всё как в Git
